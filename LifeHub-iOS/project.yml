# XcodeGen — genera LifeHub.xcodeproj con `xcodegen generate` (en Mac)
name: LifeHub
options:
  bundleIdPrefix: com.daniel
  deploymentTarget:
    iOS: "17.0"
packages: {}
targets:
  LifeHub:
    type: application
    platform: iOS
    sources:
      - LifeHub
    assets: LifeHub/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.lifehub
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    info:
      path: LifeHub/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Life Hub
        NSAppTransportSecurity:
          # El backend corre por HTTP plano (VPS :8011)
          NSAllowsArbitraryLoads: true
        NSPhotoLibraryUsageDescription: Para subir fotos de progreso al Gym.
        UIUserInterfaceStyle: Dark
        UIAppFonts:
          - Fraunces-Regular.ttf
          - Fraunces-SemiBold.ttf
          - Fraunces-Bold.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
